name: Release Windows

on:
  push:
    tags:
      - "v*-win"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-win}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Stamp version into package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.meta.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      - name: Build Vite bundles
        shell: bash
        run: |
          export STANDALONE_BUILD=1
          npx vite build --config vite.main.config.ts
          npx vite build --config vite.preload.config.ts
          npx vite build --config vite.renderer.config.ts

      - name: Package with electron-builder
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daylens ${{ steps.meta.outputs.version }} (Windows)
          tag_name: ${{ github.ref_name }}
          body: |
            ## Daylens ${{ steps.meta.outputs.version }} for Windows

            Your personal activity analyst — now on Windows.

            Daylens watches the apps, browsers, and websites you use throughout the day, then turns that activity into grounded AI insight. Everything stays on your machine. No subscription, no cloud, no telemetry.

            ### Fixes in this build
            - Fixes the packaged-app startup crash from `v0.1.6-win`
            - Publishes a single Windows x64 NSIS installer (`Setup.exe`)

            ### Install

            1. Download `Daylens-${{ steps.meta.outputs.version }}-Setup.exe` below
            2. Run it — Windows may show a security warning, click **"More info" → "Run anyway"**
            3. Let the installer replace any previous Daylens Windows install
            4. Daylens launches automatically when done

            ### System requirements
            - Windows 10 or later (64-bit)
            - Internet connection only for AI features (Claude API key)

            ### Also available
            - **macOS**: [macOS releases](https://github.com/irachrist1/daylens/releases)
          files: |
            dist-release/Daylens-${{ steps.meta.outputs.version }}-Setup.exe
