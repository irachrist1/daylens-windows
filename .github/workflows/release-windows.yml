name: Release Windows

on:
  push:
    tags:
      - "v*-win"
  workflow_dispatch:
    inputs:
      version:
        description: Windows version number to release
        required: true
      tag_name:
        description: Git tag to publish against
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      WIN_CERTIFICATE_FILE: ${{ secrets.WIN_CERTIFICATE_FILE }}
      WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
      WIN_CERT_SUBJECT_NAME: ${{ secrets.WIN_CERT_SUBJECT_NAME }}

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION="${VERSION%-win}"
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Stamp version into package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.meta.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      - name: Typecheck
        run: npm run typecheck

      - name: Build Vite bundles
        shell: bash
        run: |
          export STANDALONE_BUILD=1
          npx vite build --config vite.main.config.ts
          npx vite build --config vite.preload.config.ts
          npx vite build --config vite.renderer.config.ts

      # ── Code signing ──────────────────────────────────────────────────────
      # Requires GitHub Actions secrets:
      #   WIN_CERTIFICATE_FILE      — base64-encoded PFX (OV or EV certificate)
      #   WIN_CERTIFICATE_PASSWORD  — PFX password
      #   WIN_CERT_SUBJECT_NAME     — e.g. "Daylens Inc."
      # Obtain an OV or EV code-signing certificate from a trusted CA
      # (e.g. DigiCert, Sectigo) and store the PFX as a base64 secret.
      - name: Decode code-signing certificate
        if: ${{ env.WIN_CERTIFICATE_FILE != '' }}
        shell: bash
        run: |
          echo "$WIN_CERTIFICATE_FILE" | base64 --decode > /tmp/cert.pfx
          echo "WIN_CERTIFICATE_FILE_PATH=/tmp/cert.pfx" >> "$GITHUB_ENV"
          echo "WIN_CERTIFICATE_PASSWORD=$WIN_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          echo "WIN_CERT_SUBJECT_NAME=$WIN_CERT_SUBJECT_NAME" >> "$GITHUB_ENV"

      - name: Package with electron-builder
        run: npx electron-builder --win --publish always --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          CHANGELOG_SECTION="$(awk -v version="$VERSION" '
            $0 ~ "^## v" version " -" { flag = 1; next }
            /^## v/ && flag { exit }
            flag { print }
          ' CHANGELOG.md)"

          if [ -z "$CHANGELOG_SECTION" ]; then
            echo "Missing CHANGELOG entry for v$VERSION" >&2
            exit 1
          fi

          PREV_TAG="$(git tag --list 'v*-win' --sort=-version:refname | grep -vx "$TAG_NAME" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            COMMIT_LINES="$(git log --pretty='- %h %s' "${PREV_TAG}..HEAD" | head -n 12)"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME}"
          else
            COMMIT_LINES="$(git log --pretty='- %h %s' HEAD | head -n 12)"
            COMPARE_URL=""
          fi

          if [ -z "$COMMIT_LINES" ]; then
            COMMIT_LINES="- Initial Windows release build"
          fi

          {
            echo 'body<<EOF'
            echo "## Daylens $VERSION for Windows"
            echo
            echo "### Highlights"
            echo "$CHANGELOG_SECTION"
            echo
            echo "### Included commits"
            echo "$COMMIT_LINES"
            if [ -n "$COMPARE_URL" ]; then
              echo
              echo "Compare changes: $COMPARE_URL"
            fi
            echo
            echo "### Install"
            echo "1. Download \`Daylens-$VERSION-Setup.exe\` below"
            echo "2. Run the installer"
            echo "3. Launch Daylens from the Desktop shortcut or Start menu"
            echo
            echo "### Update"
            echo "Existing installs can pick this up through the in-app updater. Daylens will download the release in the background, show progress and highlights in-app, and then restart into the installer to finish."
            echo
            echo "### Also available"
            echo "- **macOS**: [macOS releases](https://github.com/irachrist1/daylens/releases)"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daylens ${{ steps.meta.outputs.version }} (Windows)
          tag_name: ${{ steps.meta.outputs.tag_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist-release/Daylens-${{ steps.meta.outputs.version }}-Setup.exe
            dist-release/Daylens-${{ steps.meta.outputs.version }}-Setup.exe.blockmap
            dist-release/latest.yml
