name: Release Windows

on:
  push:
    tags:
      - "v*-win"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-win}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3 -w @paymoapp/active-window

      - name: Build Vite bundles
        shell: bash
        run: |
          export STANDALONE_BUILD=1
          npx vite build --config vite.main.config.ts src/main/index.ts
          npx vite build --config vite.preload.config.ts src/preload/index.ts
          npx vite build --config vite.renderer.config.ts

      - name: Package with electron-builder
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist-release
          for f in *.exe; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daylens ${{ steps.meta.outputs.version }} (Windows)
          tag_name: ${{ github.ref_name }}
          body: |
            ## Daylens ${{ steps.meta.outputs.version }} for Windows

            Your personal activity analyst — now on Windows.

            Daylens watches the apps, browsers, and websites you use throughout the day, then turns that activity into grounded AI insight. Everything stays on your machine. No subscription, no cloud, no telemetry.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `Daylens-${{ steps.meta.outputs.version }}-x64-Setup.exe` | Windows installer (x64) |
            | `Daylens-${{ steps.meta.outputs.version }}-arm64-Setup.exe` | Windows installer (ARM64) |
            | `Daylens-${{ steps.meta.outputs.version }}-Portable.exe` | Portable — no install needed (x64) |

            ### System requirements
            - Windows 10 or later (64-bit)
            - Internet connection only for AI features (Claude API key)

            ### Install
            1. Download the Setup .exe above
            2. Run the installer — it will guide you through
            3. Launch Daylens from the Start menu

            Or use the portable .exe if you prefer not to install.

            ### Also available
            - **macOS**: `brew install --cask daylens` — [macOS releases](https://github.com/irachrist1/daylens/releases)

            SHA256 checksums are attached for verification.
          files: |
            dist-release/*.exe
            dist-release/*.sha256
