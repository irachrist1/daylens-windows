name: Release macOS

on:
  push:
    tags:
      - "v*-mac"
  workflow_dispatch:
    inputs:
      version:
        description: macOS version number to release
        required: true
      tag_name:
        description: Git tag to publish against
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    timeout-minutes: 90
    runs-on: macos-latest

    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION="${VERSION%-mac}"
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          RELEASE_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Stamp version into package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.meta.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3,@paymoapp/active-window,keytar

      - name: Typecheck
        run: npm run typecheck

      - name: Build Vite bundles
        run: npm run build:all

      - name: Package with electron-builder
        run: npx electron-builder --mac zip dmg --publish never --config electron-builder.config.js

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION="$(awk -v version="$VERSION" '
              $0 ~ "^## v" version " -" { flag = 1; next }
              /^## v/ && flag { exit }
              flag { print }
            ' CHANGELOG.md)"
          fi

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="- Preview release build for v$VERSION"
          fi

          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$' | grep -vx "$RELEASE_TAG" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            COMMIT_LINES="$(git log --pretty='- %h %s' --max-count=12 "${PREV_TAG}..${{ github.sha }}")"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.sha }}"
          else
            COMMIT_LINES="$(git log --pretty='- %h %s' --max-count=12 HEAD)"
            COMPARE_URL=""
          fi

          if [ -z "$COMMIT_LINES" ]; then
            COMMIT_LINES="- Initial macOS release build"
          fi

          {
            echo 'body<<EOF'
            echo "## Daylens $VERSION"
            echo
            echo "### Highlights"
            echo "$CHANGELOG_SECTION"
            echo
            echo "### Included commits"
            echo "$COMMIT_LINES"
            if [ -n "$COMPARE_URL" ]; then
              echo
              echo "Compare changes: $COMPARE_URL"
            fi
            echo
            echo "### Downloads"
            echo "- Windows installer: \`Daylens-${VERSION}-Setup.exe\`"
            echo "- macOS installer: \`Daylens-${VERSION}-arm64.dmg\`"
            echo "- macOS archive: \`Daylens-${VERSION}-arm64.zip\`"
            echo "- Linux AppImage: \`Daylens-${VERSION}.AppImage\`"
            echo "- Linux packages: \`Daylens-${VERSION}.deb\`, \`Daylens-${VERSION}.rpm\`, and \`Daylens-${VERSION}.tar.gz\`"
            echo
            echo "### Release assets"
            echo "This shared version release is populated by the macOS, Windows, and Linux workflows."
            echo 'Updater metadata (`latest-mac.yml`, `latest.yml`, `latest-linux.yml`) lives on this same release so packaged apps across platforms resolve one version tag.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daylens ${{ steps.meta.outputs.version }}
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.notes.outputs.body }}
          overwrite_files: true
          files: |
            dist-release/*.dmg
            dist-release/*.dmg.blockmap
            dist-release/*.zip
            dist-release/*.zip.blockmap
            dist-release/latest-mac.yml

      - name: Upload macOS diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: macos-release-diagnostics-${{ steps.meta.outputs.version }}
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
          path: |
            dist-release/**
            builder-debug.yml
            electron-builder-debug.yml
            npm-debug.log*
