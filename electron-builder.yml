appId: com.daylens.windows
productName: DaylensWindows
copyright: Copyright © 2026 Daylens

directories:
  output: dist-release
  buildResources: build

files:
  - "dist/**/*"
  - "package.json"

extraMetadata:
  main: dist/main/main.js

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  artifactName: "Daylens-${version}-Setup.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Daylens
  runAfterFinish: false

asar: true

# Native modules that must be unpacked from the asar archive
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/@paymoapp/active-window/**"
  - "node_modules/keytar/**"

publish:
  provider: github
  owner: irachrist1
  repo: daylens-windows
